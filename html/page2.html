<!Doctype html>

<html lang="vi">

	<head>
		<title>Thiết kế form đăng nhập</title>
		<meta charset ="utf-8">	
		<link rel="stylesheet" href="../css/style2.CSS">
	</head>
	
	<body>
        <div class = "container">
            <form id = "frmLogin">
		        <h2 id = "title">Đăng nhập hệ thống</h2>
                <div class = "form-group">
                    <label for = "tenDN">Tên đăng nhập: </label>
                    <input class = "form-control" type = "text" id = "tenDN" name="tenDN">
                </div>
                <div class = "form-group">
                    <label for = "matKhau">Mật khẩu: </label>
                    <input class = "form-control" type = "password" id = "matKhau" name="matKhau">
                </div>
                <div id="bt">
                <input class = "button" type = "submit" id = "sbLog" name = "sbLog" value="Đăng nhập">
                <input class = "button1" type = "reset" id = "rs" name = "rs" value="Nhập lại">
                </div>
            </form>
        </div>
    </body>
</html>
