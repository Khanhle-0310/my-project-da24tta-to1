<!Doctype html>

<html lang="vi">

	<head>
		<title>Tính Tổng</title>
		<meta charset ="utf-8">	
		<link rel="stylesheet" href="../css/style4.css">
	</head>
	
	<body>

<h2>Hóa đơn thanh toán</h2>

<table>
    <tr>
        <th>STT</th>
        <th>Tên sản phẩm</th>
        <th>Số lượng</th>
        <th>Đơn giá</th>
        <th>Thành tiền</th>
    </tr>

    <tr>
        <td>1</td>
        <td>A</td>
        <td><input class="sl" value="3"></td>
        <td><input class="dg" value="1000"></td>
        <td class="tt"></td>
    </tr>

    <tr>
        <td>2</td>
        <td>B</td>
        <td><input class="sl" value="4"></td>
        <td><input class="dg" value="2000"></td>
        <td class="tt"></td>
    </tr>

    <tr>
        <td>3</td>
        <td>C</td>
        <td><input class="sl" value="5"></td>
        <td><input class="dg" value="4000"></td>
        <td class="tt"></td>
    </tr>

    <tr>
        <td>4</td>
        <td>D</td>
        <td><input class="sl" value="2"></td>
        <td><input class="dg" value="5000"></td>
        <td class="tt"></td>
    </tr>

    <tr>
        <td colspan="4"><b>Tổng thanh toán</b></td>
        <td id="tong"></td>
    </tr>
</table>


<script>
function tinhTien() {
    let dongia = document.getElementsByClassName("dg");
    let soluong = document.getElementsByClassName("sl");
    let thanhtien = document.getElementsByClassName("tt");

    let tong = 0;

    for (let i = 0; i < dongia.length; i++) {
        thanhtien[i].innerHTML= soluong[i].value * dongia[i].value;

        tong = tong + parseInt(thanhtien[i].innerHTML);
    }

    document.getElementById("tong").innerText = tong;
}
</script>
<div class="btn-container">
    <button onclick="tinhTien()">Tính tiền</button>
</div>

</body>
</html>
